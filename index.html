<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>mosha-tailwind</title>
    </head>
    <body>
        <div class="h-screen flex flex-col items-center gap-[32px] my-[170px]">
            <div class="flex flex-col justify-center items-center w-3xs">
                <h1 class="w-3xs text-2xl font-bold md:text-4xl">どこの駅にいこうか</h1>
                <p class="w-3xs text-sm text-gray-600 md:text-base">次の休日はここで決まり</p>
            </div>
            <div
                id="stationWrap"
                class="flex flex-col gap-[4px] justify-center items-center rounded-2xl border animate-fadeUp p-[36px] w-[300px] md:w-[400px] lg:w-[500px] xl:w-[600px]"
            >
                <div class="flex gap-[12px]">
                    <img
                        id="trainImg"
                        src="./src/assets/Midosuji_logo.png"
                        alt=""
                        class="w-[48px] h-[48px] object-cover my-[12px]"
                    />
                    <img
                        id="trainImg"
                        src="./src/assets/Gakken_logo.png"
                        alt=""
                        class="w-[48px] h-[48px] object-cover my-[12px]"
                    />
                </div>
                <div class="flex flex-col gap-[4px] justify-center items-center">
                    <h2 id="stationName" class="text-3xl font-bold md:text-4xl animate-fadeUp">
                        北花田
                    </h2>
                    <p id="trainLine" class="text-sm text-gray-500 animate-fadeUp">
                        大阪メトロ・御堂筋線
                    </p>
                </div>
            </div>
            <button
                id="stationBtn"
                class="text-gray-50 bg-blue-600 rounded-2xl font-bold p-[16px] w-[300px] md:w-[400px] lg:w-[500px] xl:w-[600px] hover:bg-blue-700 hover:scale-[99%] duration-300"
            >
                駅を決める
            </button>
        </div>
        <script type="module" src="/src/js/main.js"></script>
    </body>
</html>
